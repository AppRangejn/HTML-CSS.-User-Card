<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="shortcut icon" href="./assets/icons/user.png" type="image/x-icon">
</head>
<body>
    <div class="card">
        <div class="insideBlock">
            <div class="titleBlock">
                <img src="./assets/icons/paper-plane.png" alt="Location icon">
                <span>New York City, NY</span>
            </div>

            <div class="avatarBlock">
                <img src="./assets/images/phto-woman.avif" alt="Margot Robbie">
            </div>

            <div class="nameAvatarBlock">
                <h1>Margot Robbie</h1>
            </div>

            <div class="descriptionBlock">
                <p>Margot Robbie was born in Dalby, Queensland, Australia and raised on the Gold Coast.</p>
            </div>

            <div class="buttonClick">
                <input type="button" value="Follow">
            </div>
        </div>
                <footer class="outsideBlock">
                    <div class="photoPost">
                        <img src="./assets/icons/post.png" alt="Posts icon">
                        <div class="statText">
                            <span>Posts</span>
                            <b>635</b>
                        </div>
                    </div>

                    <div class="favourite">
                        <img src="./assets/icons/like.png" alt="Heart icon">
                        <div class="statText">
                            <span>Favourites</span>
                            <b>3,472</b>
                        </div>
                    </div>

                    <div class="message">
                        <img src="./assets/icons/paper-plane.png" alt="Message icon">
                        <div class="statText">
                            <span>Message</span>
                            <b>1,293</b>
                        </div>
                    </div>
                </footer>
    </div>
</body>
</html>
